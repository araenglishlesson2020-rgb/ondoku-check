<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>🎤 音読チェック</title>
<style>
  :root{
    --bg:#EEF6E4; --bg2:#E3F0D2; --surface:#ffffff; --surface2:#F5FAEC;
    --ink:#26331B; --muted:#6E8059; --line:rgba(38,51,27,.12);
    --leaf:#3FA34D; --leaf-deep:#1E6B33; --leaf-lite:#7FCB63;
    --sun:#F4B740; --apple:#E4572E; --plum:#8A4FA0;
    --good:#3FA34D; --bad:#E4572E;
    --shadow:0 10px 30px rgba(38,51,27,.14); --shadow-sm:0 4px 14px rgba(38,51,27,.12);
    --font-round:"Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4","M PLUS Rounded 1c",system-ui,sans-serif;
    --font-en:"Arial Rounded MT Bold","Verdana",system-ui,sans-serif;
    --font-body:"Hiragino Sans","ヒラギノ角ゴシック ProN",system-ui,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#141d14; --bg2:#101810; --surface:#1E2A1D; --surface2:#243020;
      --ink:#EAF3E0; --muted:#9DB08E; --line:rgba(234,243,224,.14);
      --leaf:#56C168; --leaf-deep:#2E8B45; --good:#56C168;
      --shadow:0 10px 30px rgba(0,0,0,.5); --shadow-sm:0 4px 14px rgba(0,0,0,.45); }
  }
  *{box-sizing:border-box}
  body{margin:0; font-family:var(--font-body); color:var(--ink);
    background:radial-gradient(120% 60% at 50% -10%, var(--bg2), transparent 60%), var(--bg); min-height:100dvh;
    -webkit-tap-highlight-color:transparent}
  .wrap{max-width:480px; margin:0 auto; padding:16px 16px 48px}
  h1,h2{font-family:var(--font-round); margin:0}
  .hero{background:linear-gradient(160deg,var(--leaf),var(--leaf-deep)); color:#fff; border-radius:22px; padding:16px 18px; box-shadow:var(--shadow)}
  .hero .k{font-size:11px; letter-spacing:.12em; opacity:.85; font-family:var(--font-round)}
  .hero h1{font-size:21px; margin-top:2px}
  .hero .who{font-size:12.5px; opacity:.92; margin-top:4px}
  .card{background:var(--surface); border:1.5px solid var(--line); border-radius:22px; box-shadow:var(--shadow-sm); padding:20px 16px; margin-top:14px; text-align:center}
  .prog{font-family:var(--font-round); font-size:12.5px; color:var(--muted); display:flex; justify-content:space-between; margin:14px 2px 6px}
  .track{height:9px; background:var(--surface2); border:1px solid var(--line); border-radius:99px; overflow:hidden}
  .fill{height:100%; background:linear-gradient(90deg,var(--leaf-lite),var(--leaf)); width:0; transition:width .3s; border-radius:99px}
  .sent{font-family:var(--font-en); font-size:25px; line-height:1.6; font-weight:700; word-break:break-word}
  .wd{display:inline-block; padding:1px 4px; border-radius:8px; margin:1px 0}
  .wd.ok{color:var(--good); background:color-mix(in srgb,var(--good) 13%, transparent)}
  .wd.ng{color:var(--bad); background:color-mix(in srgb,var(--bad) 13%, transparent); text-decoration:underline wavy}
  .ja{font-size:13px; color:var(--muted); margin-top:8px; font-family:var(--font-round)}
  .heard{font-size:13px; color:var(--muted); margin-top:12px; min-height:18px; line-height:1.5}
  .heard .en{font-family:var(--font-en)}
  .fb{font-family:var(--font-round); font-weight:700; font-size:16px; min-height:24px; margin-top:8px}
  .fb.ok{color:var(--good)} .fb.tr{color:var(--plum)}
  .mic{width:104px; height:104px; border-radius:50%; border:none; background:linear-gradient(160deg,var(--leaf),var(--leaf-deep));
    color:#fff; font-size:44px; box-shadow:0 6px 0 var(--leaf-deep), var(--shadow-sm); cursor:pointer; margin:14px auto 2px; display:block}
  .mic:active{transform:translateY(3px); box-shadow:0 2px 0 var(--leaf-deep)}
  .mic.listening{animation:pulse 1.1s ease-in-out infinite; background:linear-gradient(160deg,var(--apple),#c23a15)}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .miclbl{font-family:var(--font-round); font-size:13px; color:var(--muted); margin-top:8px}
  .actions{display:flex; gap:10px; margin-top:14px}
  .btn{flex:1; border:none; border-radius:16px; padding:15px 10px; font-size:16px; font-family:var(--font-round); font-weight:700; cursor:pointer}
  .btn:active{transform:translateY(2px)}
  .btn.go{background:var(--leaf); color:#fff; box-shadow:0 4px 0 var(--leaf-deep)}
  .btn.ghost{background:var(--surface); color:var(--muted); border:1.5px solid var(--line)}
  .note{font-family:var(--font-round); font-size:12.5px; color:var(--muted); line-height:1.7; text-align:left; margin-top:10px}
  .stars{font-size:30px; letter-spacing:4px; margin:8px 0 2px}
  .pct{font-family:var(--font-en); font-size:44px; font-weight:700; color:var(--leaf-deep)}
  .misslist{font-family:var(--font-en); font-size:16px; line-height:1.9; margin-top:6px}
  .misslist span{display:inline-block; background:color-mix(in srgb,var(--bad) 12%, transparent); color:var(--bad); border-radius:10px; padding:2px 10px; margin:2px}
  .sendst{font-family:var(--font-round); font-size:12.5px; color:var(--muted); margin-top:10px; min-height:18px}
  .err{background:color-mix(in srgb,var(--sun) 18%, transparent); border:1.5px solid var(--sun); border-radius:16px;
    padding:12px 14px; font-size:13px; line-height:1.7; text-align:left; margin-top:12px; font-family:var(--font-round)}
  .hidden{display:none !important}
  .sum-sent{text-align:left; font-family:var(--font-en); font-size:16px; line-height:1.8; padding:8px 0; border-bottom:1px dashed var(--line)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="k">ONDOKU CHECK</div>
    <h1>🎤 音読チェック</h1>
    <div class="who" id="who"></div>
  </div>

  <!-- スタート -->
  <section id="scrStart">
    <div class="card">
      <div style="font-size:46px">🎤</div>
      <h2 style="font-size:19px; margin-top:6px" id="lessonTitle"></h2>
      <div class="note">
        ① 下のボタンをおす<br>
        ② 「マイクの使用を許可しますか？」→ <b>許可</b><br>
        ③ 緑のマイクをおして、文を <b>はっきり声に出して</b> 読もう<br>
        ④ どの単語が読めたか、みどり✓・赤✗ でわかるよ
      </div>
      <div class="actions"><button class="btn go" id="btnStart">はじめる ▶</button></div>
      <div id="srWarn"></div>
    </div>
  </section>

  <!-- 1文ずつ -->
  <section id="scrRun" class="hidden">
    <div class="prog"><span id="pLbl">文 1</span><span id="pCnt">1 / 10</span></div>
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="card">
      <div class="sent" id="sent"></div>
      <div class="ja" id="ja"></div>
      <div class="fb" id="fb"></div>
      <button class="mic" id="mic">🎤</button>
      <div class="miclbl" id="micLbl">マイクをおして、読んでみよう</div>
      <div class="heard" id="heard"></div>
    </div>
    <div class="actions">
      <button class="btn ghost" id="btnModel">🔊 お手本</button>
      <button class="btn go hidden" id="btnNext">つぎへ ▶</button>
    </div>
    <div id="runErr"></div>
  </section>

  <!-- けっか -->
  <section id="scrDone" class="hidden">
    <div class="card">
      <div style="font-size:44px" id="doneEmoji">🎉</div>
      <h2 style="font-size:20px">チェックおわり！</h2>
      <div class="stars" id="stars"></div>
      <div>正しく読めた語</div>
      <div class="pct" id="pct">0%</div>
      <div id="missWrap"><div style="font-family:var(--font-round); font-size:13px; color:var(--muted); margin-top:8px">れんしゅうすると強くなる語 💪</div>
        <div class="misslist" id="miss"></div></div>
      <div class="sendst" id="sendst"></div>
    </div>
    <div class="card" style="text-align:left">
      <div style="font-family:var(--font-round); font-size:13px; color:var(--muted)">文ごとのけっか</div>
      <div id="sumList"></div>
    </div>
    <div class="actions">
      <button class="btn ghost" id="btnRetry">もう一回 🔁</button>
      <button class="btn go" id="btnClose">クエストにもどる 🏡</button>
    </div>
    <div class="note">※この画面は とじてOK。けっかは先生に とどいているよ。</div>
  </section>
</div>

<script>
(function(){
  "use strict";
  var $=function(s){return document.querySelector(s)};
  function escT(x){ return String(x).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }

  // ---- 起動データ（クエスト本体からURLハッシュで受け取る） ----
  var DATA=null;
  try{
    var h=location.hash.replace(/^#/,"").replace(/-/g,"+").replace(/_/g,"/");
    while(h.length%4) h+="=";
    DATA=JSON.parse(decodeURIComponent(escape(atob(h))));
  }catch(e){}
  if(!DATA || !DATA.sents || !DATA.sents.length){
    document.body.innerHTML='<div class="wrap"><div class="card"><div style="font-size:40px">🐛</div>'+
      '<h2 style="font-size:18px">データが見つからないよ</h2>'+
      '<div class="note">単語クエストの「🎤 チェックをはじめる」ボタンから ひらいてね。</div></div></div>';
    return;
  }
  $("#who").textContent=(DATA.name?DATA.name+" さん · ":"")+DATA.lessonTitle;
  $("#lessonTitle").textContent=DATA.lessonTitle;

  // ---- 音声合成（お手本） ----
  function sayEn(t){ try{ if(!window.speechSynthesis)return; speechSynthesis.cancel(); speechSynthesis.resume();
    var u=new SpeechSynthesisUtterance(t); u.lang="en-US"; u.rate=.85; speechSynthesis.speak(u); }catch(e){} }

  // ---- 語の正規化・同一判定 ----
  var CONTR={"i'm":"i am","you're":"you are","he's":"he is","she's":"she is","it's":"it is","we're":"we are","they're":"they are",
    "isn't":"is not","aren't":"are not","wasn't":"was not","weren't":"were not","don't":"do not","doesn't":"does not","didn't":"did not",
    "can't":"can not","cannot":"can not","couldn't":"could not","won't":"will not","wouldn't":"would not","shouldn't":"should not",
    "i'll":"i will","you'll":"you will","he'll":"he will","she'll":"she will","we'll":"we will","they'll":"they will",
    "i've":"i have","you've":"you have","we've":"we have","they've":"they have","i'd":"i would","let's":"let us",
    "that's":"that is","there's":"there is","here's":"here is","what's":"what is","who's":"who is"};
  var NUMW={"1":"one","2":"two","3":"three","4":"four","5":"five","6":"six","7":"seven","8":"eight","9":"nine","10":"ten",
    "11":"eleven","12":"twelve","13":"thirteen","14":"fourteen","15":"fifteen","16":"sixteen","17":"seventeen","18":"eighteen","19":"nineteen",
    "20":"twenty","30":"thirty","40":"forty","50":"fifty","60":"sixty","70":"seventy","80":"eighty","90":"ninety","100":"one hundred","0":"zero"};
  // 聞き取りで同じ音になる語（どちらでも正解にする）
  var HOMO=[["to","too","two"],["there","their"],["hear","here"],["right","write"],["know","no"],["one","won"],["see","sea"],
    ["by","buy","bye"],["our","hour"],["for","four"],["son","sun"],["would","wood"],["ate","eight"],["red","read"],["be","bee"],
    ["i","eye"],["meet","meat"],["week","weak"],["knew","new"],["wear","where"],["flower","flour"],["sail","sale"],["tail","tale"],["shirly","shirley","surely"]];
  var H2C={}; HOMO.forEach(function(g,gi){ g.forEach(function(w){ H2C[w]="h"+gi; }); });
  function tokenizeWord(w){
    var t=String(w).toLowerCase().replace(/[’‘]/g,"'").replace(/[^a-z0-9']/g,"");
    if(!t) return [];
    if(CONTR[t]) return CONTR[t].split(" ");
    if(/^[0-9]+$/.test(t)) return (NUMW[t]||t).split(" ");
    return [t.replace(/'/g,"")].filter(Boolean);
  }
  function tokenize(str){ var out=[]; String(str).split(/\s+/).forEach(function(w){ out=out.concat(tokenizeWord(w)); }); return out; }
  // 人名など固有名詞（大文字はじまりで文頭以外にも出る語）は、聞き取りブレに寛容にする
  var PROPER={};
  function lev(a,b){ var la=a.length, lb=b.length, i, j;
    var d=[]; for(i=0;i<=la;i++){ d.push([i]); } for(j=1;j<=lb;j++) d[0][j]=j;
    for(i=1;i<=la;i++) for(j=1;j<=lb;j++)
      d[i][j]=Math.min(d[i-1][j]+1, d[i][j-1]+1, d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
    return d[la][lb]; }
  function eq(a,b){
    if(a===b) return true;
    if(H2C[a]&&H2C[a]===H2C[b]) return true;
    if(PROPER[a] && b && lev(a,b)<=(a.length>=4?2:1)) return true;
    return false;
  }
  // LCS（順番を守った最長一致）で、正解文のどのトークンが読めたかを求める
  function align(T,H){
    var n=T.length, m=H.length, i, j;
    var dp=[]; for(i=0;i<=n;i++){ dp.push(new Array(m+1).fill(0)); }
    for(i=1;i<=n;i++) for(j=1;j<=m;j++)
      dp[i][j] = eq(T[i-1],H[j-1]) ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j], dp[i][j-1]);
    var hit=new Array(n).fill(false); i=n; j=m;
    while(i>0&&j>0){
      if(eq(T[i-1],H[j-1]) && dp[i][j]===dp[i-1][j-1]+1){ hit[i-1]=true; i--; j--; }
      else if(dp[i-1][j]>=dp[i][j-1]) i--; else j--;
    }
    return hit;
  }

  // ---- 文ごとの状態 ----
  // words: 表示上の単語（スペース区切り）。tokens: 判定用トークン（語→複数トークンあり）
  var SENTS=DATA.sents.map(function(s){
    var words=String(s.en).trim().split(/\s+/);
    var wordTok=words.map(tokenizeWord);
    return { en:s.en, ja:s.ja||"", words:words, wordTok:wordTok,
      flat:[].concat.apply([],wordTok),
      judgeable:wordTok.map(function(t){return t.length>0}),
      best:null, heard:"" };
  });
  var idx=0;
  // 固有名詞を集める：文頭以外で大文字はじまりの語（Irma, Shirly など）
  SENTS.forEach(function(s){ s.words.forEach(function(w,i){
    if(i>0 && /^[A-Z][a-z]/.test(w)){ tokenizeWord(w).forEach(function(t){ PROPER[t]=1; }); }
  }); });

  // ---- 音声認識 ----
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var rec=null, listening=false, recTimer=null;
  if(!SR){
    $("#srWarn").innerHTML='<div class="err">⚠️ この機能は <b>iPhone/iPadのSafari</b> か <b>パソコン/AndroidのChrome</b> で使えるよ。<br>LINEやアプリの中のブラウザだと動かないことがあるので、Safariで開き直してね。</div>';
  }

  function renderSentence(hit){
    var s=SENTS[idx];
    $("#sent").innerHTML=s.words.map(function(w,i){
      var cls="wd";
      if(hit){ if(!s.judgeable[i]) cls="wd ok"; else cls=hit[i]?"wd ok":"wd ng"; }
      return '<span class="'+cls+'">'+escT(w)+'</span>';
    }).join(" ");
    $("#ja").textContent=s.ja;
  }
  function showStep(){
    var s=SENTS[idx];
    $("#pLbl").textContent="文 "+(idx+1);
    $("#pCnt").textContent=(idx+1)+" / "+SENTS.length;
    $("#fill").style.width=(idx/SENTS.length*100)+"%";
    renderSentence(s.best && s.best.wordHit);
    $("#fb").textContent=""; $("#fb").className="fb";
    $("#heard").textContent="";
    $("#btnNext").classList.toggle("hidden", !s.best);
    $("#micLbl").textContent="マイクをおして、読んでみよう";
  }

  // 表示単語ごとの ✓✗ を求める（部分トークンが全部読めていたら✓）
  function judgeWords(s, transcripts){
    var flatSet={}; s.flat.forEach(function(t){flatSet[t]=1});
    var bestHit=null, bestOk=-1;
    transcripts.forEach(function(tr){
      var H=tokenize(tr);
      // 複合語対策：聞き取りが2語に割れた時（shore line → shoreline）はつなげる
      var H2=[]; for(var q=0;q<H.length;q++){
        if(q<H.length-1 && flatSet[H[q]+H[q+1]]){ H2.push(H[q]+H[q+1]); q++; } else H2.push(H[q]);
      }
      H=H2;
      var flatHit=align(s.flat, H);
      var wordHit=[], p=0, okCount=0;
      s.wordTok.forEach(function(toks,i){
        if(!toks.length){ wordHit.push(true); return; }
        var all=true;
        for(var k=0;k<toks.length;k++){ if(!flatHit[p+k]) all=false; }
        p+=toks.length;
        wordHit.push(all); if(all) okCount++;
      });
      if(okCount>bestOk){ bestOk=okCount; bestHit={wordHit:wordHit, ok:okCount}; }
    });
    return bestHit;
  }

  function startRec(){
    if(!SR || listening) return;
    var s=SENTS[idx];
    try{ rec=new SR(); }catch(e){ return; }
    rec.lang="en-US"; rec.interimResults=true; rec.maxAlternatives=5; rec.continuous=false;
    var finals=[];
    listening=true;
    $("#mic").classList.add("listening"); $("#mic").textContent="👂";
    $("#micLbl").textContent="きいてるよ… はっきり読んでね";
    $("#fb").textContent=""; $("#heard").textContent="";
    recTimer=setTimeout(function(){ try{rec.stop()}catch(e){} }, 15000);
    rec.onresult=function(ev){
      var interim="";
      for(var i=0;i<ev.results.length;i++){
        var r=ev.results[i];
        if(r.isFinal) finals[i]=r; else interim+=r[0].transcript;
      }
      if(interim) $("#heard").innerHTML='<span class="en">'+escT(interim)+'</span>';
    };
    rec.onerror=function(ev){
      listening=false; clearTimeout(recTimer);
      $("#mic").classList.remove("listening"); $("#mic").textContent="🎤";
      if(ev.error==="not-allowed" || ev.error==="service-not-allowed"){
        $("#runErr").innerHTML='<div class="err">⚠️ マイクが使えないみたい。<br>・アドレスバーの設定から「マイク」を <b>許可</b> にしてね<br>・iPhoneは「設定 → Safari → マイク → 許可」<br>・LINEの中のブラウザではなく <b>Safari/Chrome</b> で開いてね</div>';
        $("#micLbl").textContent="マイクの許可ができたら、もう一回おしてね";
      } else if(ev.error==="no-speech"){
        $("#micLbl").textContent="きこえなかったみたい。もう一回おして、大きな声で！";
      } else {
        $("#micLbl").textContent="うまくいかなかった…もう一回おしてね";
      }
    };
    rec.onend=function(){
      listening=false; clearTimeout(recTimer);
      $("#mic").classList.remove("listening"); $("#mic").textContent="🎤";
      var cands=[];
      var joined=finals.filter(Boolean).map(function(r){return r[0].transcript}).join(" ").trim();
      if(joined) cands.push(joined);
      var fin=finals.filter(Boolean);
      if(fin.length===1){ for(var a=0;a<fin[0].length;a++){ cands.push(fin[0][a].transcript); } }
      if(!cands.length){ if(!$("#runErr").innerHTML) $("#micLbl").textContent="きこえなかったみたい。もう一回！"; return; }
      $("#heard").innerHTML='きこえた英語：<span class="en">'+escT(cands[0])+'</span>';
      var hit=judgeWords(s,cands);
      var total=s.judgeable.filter(Boolean).length;
      // 前より良ければ更新（悪くならない）
      if(!s.best || hit.ok>s.best.ok){ s.best=hit; s.heard=cands[0]; }
      renderSentence(hit.wordHit);
      var fb=$("#fb");
      if(hit.ok>=total){ fb.className="fb ok"; fb.textContent="パーフェクト！🎉"; }
      else{ fb.className="fb tr"; fb.textContent="✓ "+hit.ok+" / "+total+"　赤いところ、もう一回チャレンジ？💪"; }
      $("#micLbl").textContent="もう一回よむ？（いいほうのけっかが のこるよ）";
      $("#btnNext").classList.remove("hidden");
    };
    try{ rec.start(); }catch(e){ listening=false; }
  }

  // ---- けっか集計・送信 ----
  function finish(){
    $("#scrRun").classList.add("hidden"); $("#scrDone").classList.remove("hidden");
    var ok=0, total=0, missed=[], missSeen={}, detail=[];
    var sumHtml="";
    SENTS.forEach(function(s,si){
      var t=s.judgeable.filter(Boolean).length; total+=t;
      var hit=s.best?s.best.wordHit:s.words.map(function(){return false});
      var o=s.best?s.best.ok:0; ok+=o;
      var ngWords=[];
      s.words.forEach(function(w,i){ if(s.judgeable[i]&&!hit[i]){ var key=w.toLowerCase().replace(/[^a-z']/g,"");
        ngWords.push(w); if(key&&!missSeen[key]){missSeen[key]=1; missed.push(w.replace(/[^A-Za-z']/g,""));} } });
      detail.push((si+1)+") "+s.en+(ngWords.length?(" → ✗ "+ngWords.join(", ")):" → ぜんぶ⭕"));
      sumHtml+='<div class="sum-sent">'+s.words.map(function(w,i){
        var cls=(!s.judgeable[i]||hit[i])?"wd ok":"wd ng"; return '<span class="'+cls+'">'+escT(w)+'</span>'; }).join(" ")+'</div>';
    });
    var pct=total?Math.round(ok/total*100):0;
    $("#pct").textContent=pct+"%";
    $("#stars").textContent = pct>=90?"⭐⭐⭐" : pct>=70?"⭐⭐☆" : "⭐☆☆";
    $("#doneEmoji").textContent = pct>=90?"🦋":"🎉";
    if(missed.length){ $("#miss").innerHTML=missed.slice(0,20).map(function(w){return '<span>'+escT(w)+'</span>'}).join(""); }
    else { $("#missWrap").innerHTML='<div class="fb ok" style="margin-top:8px">ぜんぶ読めた！パーフェクト 🎉</div>'; }
    $("#sumList").innerHTML=sumHtml;
    $("#fill") && ($("#fill").style.width="100%");

    var payload={ action:"ondoku", name:DATA.name||"", lessonTitle:DATA.lessonTitle||"",
      pct:pct, okCount:ok, total:total, missed:missed, detail:detail.join("\n") };
    // ① クエスト本体（開いたタブ）へ結果を返す
    try{ if(window.opener) window.opener.postMessage({type:"ondokuResult", pct:pct, missed:missed}, "*"); }catch(e){}
    // ② 先生のスプレッドシート「音読記録」へ送信
    if(DATA.exec){
      $("#sendst").textContent="けっかを先生に送信中…";
      fetch(DATA.exec, {method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(payload)})
        .then(function(r){return r.json()})
        .then(function(j){ $("#sendst").textContent = j&&j.ok ? "✅ けっかを先生に送ったよ" : "⚠️ 送信できなかった（先生に画面を見せてね）"; })
        .catch(function(){ $("#sendst").textContent="⚠️ 送信できなかった（先生に画面を見せてね）"; });
    } else {
      $("#sendst").textContent="";
    }
  }

  // ---- 画面遷移 ----
  $("#btnStart").onclick=function(){
    $("#scrStart").classList.add("hidden"); $("#scrRun").classList.remove("hidden");
    idx=0; showStep();
  };
  $("#mic").onclick=function(){ if(listening){ try{rec.stop()}catch(e){} return; } $("#runErr").innerHTML=""; startRec(); };
  $("#btnModel").onclick=function(){ sayEn(SENTS[idx].en); };
  $("#btnNext").onclick=function(){
    if(listening){ try{rec.stop()}catch(e){} }
    if(idx>=SENTS.length-1){ finish(); } else { idx++; showStep(); }
  };
  $("#btnRetry").onclick=function(){
    SENTS.forEach(function(s){ s.best=null; s.heard=""; });
    $("#scrDone").classList.add("hidden"); $("#scrRun").classList.remove("hidden");
    idx=0; showStep();
  };
  $("#btnClose").onclick=function(){ try{window.close()}catch(e){} };
})();
</script>
</body>
</html>
